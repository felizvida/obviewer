name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          gh --version

      - name: Validate entitlements
        run: plutil -lint Configuration/Obviewer.entitlements

      - name: Validate packaging scripts
        run: bash -n scripts/build_app.sh scripts/generate_xcode_project.sh scripts/package_release_app.sh

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: ./scripts/generate_xcode_project.sh

      - name: Create source archives
        run: |
          mkdir -p dist
          git archive --format=tar.gz --output="dist/obviewer-${GITHUB_REF_NAME}-source.tar.gz" "$GITHUB_SHA"
          git archive --format=zip --output="dist/obviewer-${GITHUB_REF_NAME}-source.zip" "$GITHUB_SHA"
          shasum -a 256 \
            "dist/obviewer-${GITHUB_REF_NAME}-source.tar.gz" \
            "dist/obviewer-${GITHUB_REF_NAME}-source.zip" \
            > "dist/obviewer-${GITHUB_REF_NAME}-sha256.txt"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: obviewer-${{ github.ref_name }}-release
          path: dist/*

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* \
              --generate-notes \
              --title "${GITHUB_REF_NAME}"
          fi
