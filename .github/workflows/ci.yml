name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  swift:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
