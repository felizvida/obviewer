name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-package:
    name: Swift Package (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - macos-14
          - macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  scaffolding:
    name: Scaffolding Checks
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate entitlements
        run: plutil -lint Configuration/Obviewer.entitlements

      - name: Validate packaging scripts
        run: bash -n scripts/build_app.sh scripts/generate_xcode_project.sh scripts/notarize_release_app.sh scripts/package_release_app.sh scripts/package_release_dmg.sh scripts/release_common.sh

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: ./scripts/generate_xcode_project.sh

      - name: Confirm generated project
        run: test -d Obviewer.xcodeproj

  benchmark-profiles:
    name: Benchmark ${{ matrix.profile }}
    runs-on: macos-15
    needs:
      - swift-package
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: smoke
            budget: Configuration/benchmark-smoke-budget.json
            artifact: benchmark-smoke-report
          - profile: integration
            budget: ""
            artifact: benchmark-integration-report
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run benchmark
        run: |
          mkdir -p build/reports
          PROFILE=${{ matrix.profile }} \
          FORMAT=json \
          OUTPUT=build/reports/benchmark-${{ matrix.profile }}.json \
          BUDGET='${{ matrix.budget }}' \
          make benchmark-vault

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: build/reports/benchmark-${{ matrix.profile }}.json
