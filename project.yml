name: Obviewer

options:
  bundleIdPrefix: com.felizvida
  deploymentTarget:
    macOS: "14.0"

configs:
  Debug: debug
  Release: release

targets:
  ObviewerCore:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/ObviewerCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.felizvida.obviewer.core
        PRODUCT_NAME: ObviewerCore
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES

  ObviewerMacApp:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    dependencies:
      - target: ObviewerCore
    sources:
      - path: Sources/ObviewerMacApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.felizvida.obviewer.macapp
        PRODUCT_NAME: ObviewerMacApp
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES

  ObviewerFixtureSupport:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/ObviewerFixtureSupport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.felizvida.obviewer.fixturesupport
        PRODUCT_NAME: ObviewerFixtureSupport
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES

  Obviewer:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/Obviewer
    dependencies:
      - target: ObviewerMacApp
    scheme:
      testTargets:
        - ObviewerCoreTests
        - ObviewerMacAppTests
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Obviewer
        LSApplicationCategoryType: public.app-category.productivity
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.felizvida.obviewer
        PRODUCT_NAME: Obviewer
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: Configuration/Obviewer.entitlements
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: 0.2.3
        CURRENT_PROJECT_VERSION: 1

  ObviewerCoreTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/ObviewerCoreTests
    dependencies:
      - target: ObviewerCore
      - target: ObviewerFixtureSupport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.felizvida.obviewer.coretests
        PRODUCT_NAME: ObviewerCoreTests
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES

  ObviewerMacAppTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/ObviewerMacAppTests
    dependencies:
      - target: ObviewerMacApp
      - target: ObviewerCore
      - target: ObviewerFixtureSupport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.felizvida.obviewer.macapptests
        PRODUCT_NAME: ObviewerMacAppTests
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
